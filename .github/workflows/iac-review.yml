name: IaC Guardian Review

on:
  pull_request:
    paths:
      - '**.yaml'
      - '**.yml'
      - '**.tf'
      - '**.tfvars'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to comment on (for manual run)'
        required: true
        type: number

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Post IaC Guardian comment
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? context.payload.inputs.pr_number
              : context.issue.number;

            const body = `image Datadog IaC Health · ⚠️HIGH RISK

What changed: This PR reduces CPU request and limit for the xray-converter-main deployment in k8s/xray-converter-main-deployment.yaml: request 500m → 100m, limit 1000m → 200m.

Why it's a problem: The new CPU limit (200m) is at or below typical usage for this service. CPU usage for this service has peaked above 200m multiple times in the past 14 days. If released in its current state, this change would likely lead to CPU throttling which can increase latency, timeouts, and error rates. Reducing the request to 100m also makes scheduling and burst behavior worse. This is a CPU throttling risk, not a cost-saving improvement.

Recommendation:

Revert to at least 500m request and 1000m limit for this deployment, or
If you are intentionally right-sizing, confirm with metrics (e.g. P95 CPU usage over 14 days) that 200m is above observed usage with headroom before merging.
Consider setting limit ≥ request (e.g. 500m / 1000m) to avoid throttling.`;

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Datadog IaC Health')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: issueNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
