apiVersion: apps/v1
kind: Deployment
metadata:
  name: xray-converter-main
  namespace: production
  labels:
    app: xray-converter-main
    team: apm
    service: xray-converter-main
spec:
  replicas: 225
  selector:
    matchLabels:
      app: xray-converter-main
  template:
    metadata:
      labels:
        app: xray-converter-main
        version: v4.1.0
    spec:
      containers:
      - name: xray-converter-main
        image: datadog/xray-converter-main:v4.1.0
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        env:
        - name: DD_ENV
          value: "production"
        - name: DD_SERVICE
          value: "xray-converter-main"
        - name: DD_VERSION
          value: "v4.1.0"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: xray-converter-main
  namespace: production
spec:
  selector:
    app: xray-converter-main
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
