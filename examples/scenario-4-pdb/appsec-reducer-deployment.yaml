apiVersion: apps/v1
kind: Deployment
metadata:
  name: appsec-reducer-signal-6cf25-datadog-sep
  namespace: production
  labels:
    app: appsec-reducer-signal-6cf25-datadog-sep
    team: appsec
    service: appsec-reducer
spec:
  replicas: 12
  selector:
    matchLabels:
      app: appsec-reducer-signal-6cf25-datadog-sep
  template:
    metadata:
      labels:
        app: appsec-reducer-signal-6cf25-datadog-sep
        version: v2.0.5
    spec:
      containers:
      - name: appsec-reducer
        image: datadog/appsec-reducer:v2.0.5
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        env:
        - name: DD_ENV
          value: "production"
        - name: DD_SERVICE
          value: "appsec-reducer"
        - name: DD_VERSION
          value: "v2.0.5"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: appsec-reducer-pdb
  namespace: production
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: appsec-reducer-signal-6cf25-datadog-sep
