apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-lifecycle-publisher-shared-bone
  namespace: production
  labels:
    app: k8s-lifecycle-publisher-shared-bone
    team: platform
    service: k8s-lifecycle-publisher
spec:
  replicas: 4
  selector:
    matchLabels:
      app: k8s-lifecycle-publisher-shared-bone
  template:
    metadata:
      labels:
        app: k8s-lifecycle-publisher-shared-bone
        version: v1.8.2
    spec:
      containers:
      - name: k8s-lifecycle-publisher
        image: datadog/k8s-lifecycle-publisher:v1.8.2
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: DD_ENV
          value: "production"
        - name: DD_SERVICE
          value: "k8s-lifecycle-publisher"
        - name: DD_VERSION
          value: "v1.8.2"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-lifecycle-publisher-shared-bone
  namespace: production
spec:
  selector:
    app: k8s-lifecycle-publisher-shared-bone
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
