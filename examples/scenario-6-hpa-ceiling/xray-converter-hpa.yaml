apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: xray-converter-main-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: xray-converter-main
  minReplicas: 50
  maxReplicas: 300
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
